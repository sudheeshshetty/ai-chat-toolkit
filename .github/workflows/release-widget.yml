name: Release ai-chat-toolkit-widget

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter ai-chat-toolkit-widget build

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Bump and tag widget version
        run: |
          cd packages/widget
          npm version ${{ github.event.inputs.version }} \
            --tag-version-prefix "widget-v" \
            -m "chore(release): ai-chat-toolkit-widget v%s"

      - name: Publish widget to npm
        run: |
          cd packages/widget
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push version commit and tag
        run: |
          git push
          git push --tags
