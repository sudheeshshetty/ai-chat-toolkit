name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test server
        run: pnpm --filter ai-chat-toolkit-server test

      - name: Test rag
        run: pnpm --filter ai-chat-toolkit-rag test

      - name: Test rag-source-local
        run: pnpm --filter ai-chat-toolkit-rag-source-local test

      - name: Test rag-store-memory
        run: pnpm --filter ai-chat-toolkit-rag-store-memory test
