name: Release ai-chat-toolkit-rag-store-memory

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump (use 'current' to publish package.json as-is)"
        required: true
        default: "current"
        type: choice
        options:
          - current
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter ai-chat-toolkit-rag-store-memory... build

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Bump and tag version
        if: github.event.inputs.version != 'current'
        run: |
          cd packages/rag-store-memory
          npm version ${{ github.event.inputs.version }} \
            --tag-version-prefix "rag-store-memory-v" \
            -m "chore(release): ai-chat-toolkit-rag-store-memory v%s"

      - name: Tag current version
        if: github.event.inputs.version == 'current'
        run: |
          cd packages/rag-store-memory
          VERSION=$(node -p "require('./package.json').version")
          git tag "rag-store-memory-v${VERSION}" -m "chore(release): ai-chat-toolkit-rag-store-memory v${VERSION}"

      - name: Publish to npm
        run: |
          cd packages/rag-store-memory
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push version commit and tag
        run: |
          git push
          git push --tags
